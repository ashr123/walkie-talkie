# Run the AOT-optimized context on the JVM. This tells Spring's AotDetector (which reads system properties and a
# classpath `spring.properties` — NOT application.yml, consulted before the Environment loads) to load the
# generated bean definitions / ApplicationContextInitializer instead of reflective startup.
#
# This file is bundled ONLY into the runnable boot jar (BOOT-INF/classes via build.gradle.kts), never into
# src/main/resources — so it is NOT on the test classpath. Tests must stay reflective: a @SpringBootTest has no
# generated context on the plain test classpath and would fail to start under this flag. bootRun sets the same
# flag via a system property instead.
#
# Note: `walkie.tls.enabled` still works under AOT — TlsConfiguration reads it at runtime (not via a build-time
# @ConditionalOnProperty), so the same AOT jar serves HTTPS:8443 (default) or HTTP:8080
# (--walkie.tls.enabled=false). See README "Native image / AOT readiness".
spring.aot.enabled=true
