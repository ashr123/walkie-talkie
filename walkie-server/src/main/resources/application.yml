server:
  # Transport TLS is ON by default (HTTPS/WSS on 8443) — see TlsConfiguration. This port is used only when
  # TLS is turned off with walkie.tls.enabled=false (e.g. behind a TLS-terminating reverse proxy on loopback).
  port: 8080
  # Graceful shutdown: on SIGTERM / context close, stop accepting new connections and let in-flight work finish
  # before the JVM exits (bounded by spring.lifecycle.timeout-per-shutdown-phase, default 30s), so a rolling
  # restart or scale-down drains cleanly instead of cutting connections mid-frame. Closing the web server closes
  # the WebSocket sessions, which runs each session's outbound-drainer flush.
  shutdown: graceful

spring:
  application:
    name: walkie-talkie-server
  # Java 25 virtual threads handle the servlet container and WebSocket work, so each connection
  # costs a few KB instead of a full platform thread.
  threads:
    virtual:
      enabled: true

walkie:
  # Permissive for local development. Restrict to your known client origins in production.
  allowed-origins:
    - "*"
  max-audio-frame-bytes: 8192
  max-text-message-bytes: 65536
  # Per-sender flood guard: drop relayed audio frames beyond this many per second (nominal traffic is ~50 fps,
  # one 20 ms frame per tick). Excess is dropped before fan-out; counts frames without inspecting them, so it
  # works on encrypted channels too. See SessionRateLimiter. Always on — 0/blank uses the default, it can't be
  # disabled (unlike the floor timers below, where 0 means off).
  max-audio-frames-per-second: 100
  # Control-plane flood guard: drop inbound control (text) messages from a session beyond this many per second.
  # Control is sparse (a few floor presses, the odd join/rename/mode, a WebRTC ICE-candidate burst at setup), so
  # this is generous for an honest client while bounding a control flood. Always on — 0/blank uses the default.
  max-control-messages-per-second: 200
  # Push-to-talk floor anti-hogging (seconds; 0 disables). Both work off frame timing only — never audio
  # content — so they apply on encrypted channels too. idle-release: reclaim the floor for a new requester once
  # the holder has sent no audio for this long. max-hold: force-release after this much continuous holding.
  floor-idle-release-seconds: 5
  floor-max-hold-seconds: 300
  # Push-to-talk floor QUEUE ("raise hand", owner-toggleable per channel — see docs/FLOOR_QUEUE.md).
  # floor-reservation-seconds: when the queue is on, how long the head is given to CLAIM the floor once it is
  # offered (its turn) before the server drops it and offers the next member. Grant-to-claim needs a positive
  # window, so — UNLIKE the timers above — 0/blank falls back to the default (10), it is not "disabled".
  # floor-queue-default: the on/off state a NEWLY created channel adopts (its owner can then toggle it); default
  # false preserves the plain busy-floor-refused behaviour.
  floor-reservation-seconds: 10
  floor-queue-default: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,loggers,metrics

logging:
  level:
    io.github.ashr123.walkietalkie: DEBUG
  # Inject the RequestContext identity (mirrored into the MDC) onto every log line: the session id, the
  # display name, and the channel the session is in. Lines outside a message scope (e.g. startup) show
  # "system"/"-"/"-"; connection-lifecycle and per-message lines carry the real session, the name once the
  # client has joined, and the channel while it is in one.
  pattern:
    level: "%5p [session=%X{session:-system} name=%X{name:--} channel=%X{channel:--}]"
    # Console pattern trimmed from Spring Boot's default: `%t` (full thread) replaces the default's `%15.15t`, which
    # capped the thread at 15 chars and front-truncated it — "tomcat-handler-114" showed as "cat-handler-114" and
    # the drainer's "ws-out-<uuid>" was unreadable. The default's PID and constant application name are dropped; in
    # that identity slot we print [${WALKIE_INSTANCE_ID:local}] — a stable, fleet-unique instance label for the
    # multi-instance (channel-affinity) deployment (a PID is PID 1 in every container, collides across hosts, and
    # changes on restart). Set WALKIE_INSTANCE_ID per instance (e.g. the Kubernetes pod name via the downward API);
    # an unset run shows "local".
    # GOTCHA: SPRING resolves the ${...} in this value (Logback never sees them), and Spring's default-value
    # separator is a single ":" — Logback's ":-" makes Spring fold the dash INTO the default. That bit us twice:
    # "${WALKIE_INSTANCE_ID:-local}" rendered "[-local]", and the date placeholder "${LOG_DATEFORMAT_PATTERN:-yyyy-
    # ...}" prefixed EVERY timestamp with a literal "-" ("-2026-..."), because neither var is set here so the
    # default branch is taken. So the WALKIE_INSTANCE_ID default uses ":", and the date format + exception word are
    # inlined with NO placeholder at all. ${LOG_LEVEL_PATTERN} stays — it is how the MDC block is injected (resolves
    # to the `level:` line above, session/name/channel) and is always set, so its ":%5p" default is never taken.
    # (The `%X{...:-...}` inside `level:` is Logback's own MDC-default syntax, resolved by Logback, so it is fine.)
    # Only the console is affected; a `logging.pattern.file` (none here) would need the same treatment.
    console: "%clr(%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}){faint} %clr(${LOG_LEVEL_PATTERN:%5p}) %clr([${WALKIE_INSTANCE_ID:local}]){magenta} %clr(---){faint} %clr([%t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx"
