org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
org.gradle.caching=true
org.gradle.parallel=true
# Caches the configuration phase (the task graph) so repeat builds skip re-evaluating the build scripts. The
# `test` and `jsTest` tasks were made compatible in walkie-server/build.gradle.kts (execution-time closures must
# not capture build-script objects). Note: the GraalVM `native*` tasks are not exercised here (they need a GraalVM
# JDK); if you run them and hit a configuration-cache problem, run that task with `--no-configuration-cache`.
org.gradle.configuration-cache=true
